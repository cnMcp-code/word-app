name: Build APK (Cloud)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

# Allow the workflow to create a GitHub Release (for the public APK download link)
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          pip install "flet==0.28.3"

      - name: Build APK
        run: echo y | flet build apk --verbose
        env:
          CI: "true"
          FLET_ANALYTICS: "0"

      - name: Verify bundled packages (no 64MB download needed)
        if: success()
        run: |
          cd build/apk
          {
            echo "=== flet in site-packages / bundle .so ==="
            for so in lib/arm64-v8a/libpythonsitepackages.so lib/arm64-v8a/libpythonbundle.so; do
              if [ -f "$so" ]; then
                echo "-- $so --"
                unzip -l "$so" 2>/dev/null | grep -iE "flet/__init__|flet_audio" || echo "(no flet match)"
              fi
            done
            echo "=== certifi in app.zip (app files) ==="
            unzip -l app.zip 2>/dev/null | grep -iE "certifi" || echo "(no certifi in app.zip)"
            echo "=== main.py import line (must be 'from flet import Audio', NO flet_audio) ==="
            unzip -p app.zip main.py 2>/dev/null | grep -iE "import Audio|flet_audio" || echo "(no import Audio found)"
          } > verify.txt 2>&1
          cat verify.txt

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: apk-${{ github.run_number }}
          name: 宝宝背单词 APK (${{ github.run_number }})
          files: |
            build/apk/*.apk
            build/apk/verify.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
